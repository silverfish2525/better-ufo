name: autofix.ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            node_modules/.cache/knip
          key: ${{ runner.os }}-autofix-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts', 'knip.json') }}
          restore-keys: |
            ${{ runner.os }}-autofix-vite-

      - run: vp run autofix

      - uses: stefanzweifel/git-auto-commit-action@v7
        id: auto-commit
        with:
          commit_message: "chore: apply automated updates [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          skip_fetch: true
          skip_checkout: true
          skip_push: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Fail on unpushable fork PR drift
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name != github.repository
          && steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          echo "Fork PR requires automated updates, but GITHUB_TOKEN cannot push to the fork. Run 'vp run autofix' locally and push the result."
          exit 1
